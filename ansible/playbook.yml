---
- name: Deploy Projeto Korp
  hosts: all
  become: true

  vars:
    projeto_dir: /opt/projeto-korp

  tasks:
    # ── 1. Instalar Docker ──────────────────────────────────────────────────────
    - name: Instalar dependências do Docker
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Adicionar chave GPG do Docker
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Adicionar repositório Docker
      shell: |
        echo \
          "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
          https://download.docker.com/linux/ubuntu \
          $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
          tee /etc/apt/sources.list.d/docker.list > /dev/null
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Instalar Docker Engine e Compose plugin
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Iniciar e habilitar Docker
      systemd:
        name: docker
        state: started
        enabled: true

    # ── 2. Copiar projeto ───────────────────────────────────────────────────────
    - name: Criar diretório do projeto
      file:
        path: "{{ projeto_dir }}"
        state: directory
        mode: "0755"

    - name: Copiar arquivos do projeto
      copy:
        src: "{{ playbook_dir }}/../"
        dest: "{{ projeto_dir }}/"
        mode: preserve

    # ── 3. Build e subida via Docker Compose ───────────────────────────────────
    - name: Build da imagem Go
      community.docker.docker_image:
        name: http-server-projeto-korp
        build:
          path: "{{ projeto_dir }}"
        source: build
        force_source: true

    - name: Subir todos os serviços
      community.docker.docker_compose_v2:
        project_src: "{{ projeto_dir }}"
        state: present
        pull: missing

    # ── 4. Validar endpoint ─────────────────────────────────────────────────────
    - name: Aguardar serviço responder
      uri:
        url: http://localhost/projeto-korp
        method: GET
        status_code: 200
      register: resposta
      retries: 10
      delay: 5
      until: resposta.status == 200

    - name: Exibir resposta do endpoint
      debug:
        msg: "Resposta do endpoint: {{ resposta.json }}"
